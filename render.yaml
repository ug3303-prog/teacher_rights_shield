services:
  - type: web
    name: minwon-shield-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_MODE
        value: production
      - key: FRONTEND_ORIGIN
        value: https://frontend-three-umber-zmhbyrqw7f.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: minwon-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: minwon-db
    plan: free
